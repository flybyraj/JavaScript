<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events in JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button onclick="console.log('Button was clicked');alert('Hello')">Click me!!!</button>
    <button ondblclick="console.log('Double Click');alert('Double Click!')"> On Double Click </button>
    <div onmouseover="console.log('You are inside Div')">This is a Div</div>
</body>
</html>
